name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:    # allow manual trigger from GitHub Actions UI

# Required for OIDC token exchange with AWS
permissions:
  id-token: write
  contents: read

env:
  AWS_REGION:      us-east-1
  TF_VERSION:      1.10.0
  ECR_REPOSITORY:  ci-prod   # must match var.project_name + "-" + var.environment

jobs:
  deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest

    steps:
      # ── 1. Checkout ──────────────────────────────────────────────────────────
      - name: Checkout code
        uses: actions/checkout@v4

      # ── 2. AWS credentials via OIDC ──────────────────────────────────────────
      # No static keys stored in GitHub. AWS issues short-lived credentials
      # after verifying the OIDC token matches the repo + branch condition
      # defined in infra/github_actions.tf.
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      # ── 3. Terraform setup ───────────────────────────────────────────────────
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}
          terraform_wrapper: false

      - name: Terraform Init
        working-directory: infra
        run: terraform init -input=false

      # ── 4. Create ECR repository (if it doesn't exist yet) ───────────────────
      # ECR must exist before the Docker push in step 5. On first deploy this
      # targeted apply creates only the repo; on subsequent runs it is a no-op.
      - name: Terraform Apply — ECR only
        working-directory: infra
        env:
          TF_VAR_db_password: ${{ secrets.TF_VAR_DB_PASSWORD }}
          TF_VAR_github_repo: ${{ github.repository }}
        run: |
          terraform apply \
            -target=aws_ecr_repository.app \
            -target=aws_ecr_lifecycle_policy.app \
            -auto-approve \
            -input=false

      # ── 5. ECR login + build + push ──────────────────────────────────────────
      # Tags the image with both the git SHA (immutable, for rollbacks) and
      # :latest (for convenience). Terraform uses the SHA tag in the task
      # definition so every push creates a new task definition revision,
      # which triggers an ECS rolling deployment automatically.
      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build, tag and push image to ECR
        id: build
        env:
          REGISTRY:  ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: sha-${{ github.sha }}
        run: |
          docker build \
            -t $REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG \
            -t $REGISTRY/$ECR_REPOSITORY:latest \
            .
          docker push $REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
          docker push $REGISTRY/$ECR_REPOSITORY:latest
          echo "tag=$IMAGE_TAG" >> $GITHUB_OUTPUT

      # ── 6. Terraform Plan ────────────────────────────────────────────────────
      # Passes the git SHA image tag and DB password as TF variables.
      # The plan output is saved to tfplan so Apply uses exactly what was planned.
      - name: Terraform Plan
        id: plan
        working-directory: infra
        env:
          TF_VAR_db_password: ${{ secrets.TF_VAR_DB_PASSWORD }}
          TF_VAR_github_repo: ${{ github.repository }}
          TF_VAR_image_tag:   ${{ steps.build.outputs.tag }}
        run: terraform plan -out=tfplan -no-color -input=false

      # ── 7. Terraform Apply ───────────────────────────────────────────────────
      # Applies the saved plan. Because var.image_tag changed (new SHA),
      # Terraform updates the ECS task definition → ECS detects a new revision
      # and performs a rolling deployment of the dashboard service.
      - name: Terraform Apply
        working-directory: infra
        env:
          TF_VAR_db_password: ${{ secrets.TF_VAR_DB_PASSWORD }}
          TF_VAR_github_repo: ${{ github.repository }}
          TF_VAR_image_tag:   ${{ steps.build.outputs.tag }}
        run: terraform apply -auto-approve -input=false tfplan

      # ── 8. Run database migration ────────────────────────────────────────────
      # Runs db/migrate.py as a one-off Fargate task inside the private VPC so it
      # can reach RDS. Uses CREATE TABLE IF NOT EXISTS so it is safe to run on
      # every deploy — no-op when the schema already exists.
      - name: Run database migration
        working-directory: infra
        run: |
          CLUSTER=$(terraform output -raw ecs_cluster_name)
          TASK_DEF=$(terraform output -raw agent_task_definition_arn)
          SUBNETS=$(terraform output -raw private_subnet_ids)
          SG=$(terraform output -raw ecs_security_group_id)

          TASK_ARN=$(aws ecs run-task \
            --cluster "$CLUSTER" \
            --task-definition "$TASK_DEF" \
            --launch-type FARGATE \
            --network-configuration "awsvpcConfiguration={subnets=[$SUBNETS],securityGroups=[$SG],assignPublicIp=DISABLED}" \
            --overrides '{"containerOverrides":[{"name":"agent","command":["python","db/migrate.py"]}]}' \
            --query 'tasks[0].taskArn' \
            --output text \
            --region "$AWS_REGION")

          echo "Migration task: $TASK_ARN"

          # Wait up to 5 minutes for the task to finish
          aws ecs wait tasks-stopped \
            --cluster "$CLUSTER" \
            --tasks "$TASK_ARN" \
            --region "$AWS_REGION"

          # Fail the workflow if the migration container exited non-zero
          EXIT_CODE=$(aws ecs describe-tasks \
            --cluster "$CLUSTER" \
            --tasks "$TASK_ARN" \
            --query 'tasks[0].containers[0].exitCode' \
            --output text \
            --region "$AWS_REGION")

          echo "Migration exit code: $EXIT_CODE"
          [ "$EXIT_CODE" = "0" ] || exit 1
