name: Destroy Infrastructure

# Manual trigger ONLY — never runs automatically.
# Tears down all AWS resources managed by Terraform.
#
# Pre-destroy steps handle resources Terraform can't delete on its own:
#   - ECS service scaled to 0 and tasks fully stopped (releases public IPs so the
#     IGW can be detached without a DependencyViolation)
#   - ALB deletion protection disabled (Terraform can't delete a protected ALB)
#   - RDS deletion protection disabled (Terraform can't delete a protected RDS instance)
#   - ECR images deleted (ECR repo must be empty before the repository is removed)
#
# Requires the same secrets as deploy.yml:
#   AWS_ROLE_ARN       — OIDC role (created by bootstrap.yml)
#   TF_VAR_DB_PASSWORD — RDS master password

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: 'Type "destroy" to confirm you want to tear down all infrastructure'
        required: true

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION:     us-east-1
  TF_VERSION:     1.10.0
  ECR_REPOSITORY: ci-prod   # must match var.project_name + "-" + var.environment
  ECS_CLUSTER:    ci-prod
  ECS_SERVICE:    ci-prod-dashboard
  ALB_NAME:       ci-prod-alb
  RDS_IDENTIFIER: ci-prod-postgres

jobs:
  destroy:
    name: Destroy AWS Infrastructure
    runs-on: ubuntu-latest

    # Hard-stop if the user didn't type the confirmation word
    if: github.event.inputs.confirm == 'destroy'

    steps:
      # ── 1. Checkout ─────────────────────────────────────────────────────────
      - name: Checkout code
        uses: actions/checkout@v4

      # ── 2. AWS credentials via OIDC ─────────────────────────────────────────
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region:     ${{ env.AWS_REGION }}

      # ── 3. Scale ECS service to 0 and wait for tasks to stop ────────────────
      # ECS tasks in public subnets hold public IP addresses. The Internet
      # Gateway cannot be detached until all those IPs are released, which only
      # happens after the task ENIs are deleted. We scale to 0, then poll until
      # no tasks remain rather than relying on `wait services-stable` alone.
      - name: Scale down ECS service and drain tasks
        run: |
          aws ecs update-service \
            --cluster "$ECS_CLUSTER" \
            --service "$ECS_SERVICE" \
            --desired-count 0 \
            --region "$AWS_REGION" || true

          echo "Waiting for all tasks in cluster to stop..."
          for i in $(seq 1 24); do
            TASK_COUNT=$(aws ecs list-tasks \
              --cluster "$ECS_CLUSTER" \
              --region "$AWS_REGION" \
              --query 'length(taskArns)' \
              --output text 2>/dev/null || echo "0")
            echo "  Running tasks: $TASK_COUNT"
            if [ "$TASK_COUNT" = "0" ]; then
              echo "✓ All tasks stopped"
              break
            fi
            sleep 10
          done

      # ── 4. Disable ALB deletion protection ──────────────────────────────────
      # alb.tf sets enable_deletion_protection = true. Terraform cannot delete
      # a protected ALB — this step disables protection so terraform destroy works.
      - name: Disable ALB deletion protection
        run: |
          ALB_ARN=$(aws elbv2 describe-load-balancers \
            --names "$ALB_NAME" \
            --region "$AWS_REGION" \
            --query 'LoadBalancers[0].LoadBalancerArn' \
            --output text 2>/dev/null || echo "None")

          if [ "$ALB_ARN" != "None" ] && [ -n "$ALB_ARN" ]; then
            aws elbv2 modify-load-balancer-attributes \
              --load-balancer-arn "$ALB_ARN" \
              --attributes Key=deletion_protection.enabled,Value=false \
              --region "$AWS_REGION"
            echo "✓ ALB deletion protection disabled"
          else
            echo "✓ ALB not found, skipping"
          fi

      # ── 5. Disable RDS deletion protection ──────────────────────────────────
      # rds.tf sets deletion_protection = true. This step disables it so
      # terraform destroy can remove the instance.
      - name: Disable RDS deletion protection
        run: |
          STATUS=$(aws rds describe-db-instances \
            --db-instance-identifier "$RDS_IDENTIFIER" \
            --region "$AWS_REGION" \
            --query 'DBInstances[0].DBInstanceStatus' \
            --output text 2>/dev/null || echo "not-found")

          if [ "$STATUS" != "not-found" ]; then
            aws rds modify-db-instance \
              --db-instance-identifier "$RDS_IDENTIFIER" \
              --no-deletion-protection \
              --apply-immediately \
              --region "$AWS_REGION"
            echo "Waiting for RDS to return to available state..."
            aws rds wait db-instance-available \
              --db-instance-identifier "$RDS_IDENTIFIER" \
              --region "$AWS_REGION"
            echo "✓ RDS deletion protection disabled and instance available"
          else
            echo "✓ RDS instance not found, skipping"
          fi

      # ── 6. Delete all ECR images ─────────────────────────────────────────────
      # ECR repository must be empty before Terraform can delete it.
      - name: Delete ECR images
        run: |
          IMAGE_IDS=$(aws ecr list-images \
            --repository-name "$ECR_REPOSITORY" \
            --region "$AWS_REGION" \
            --query 'imageIds[*]' \
            --output json 2>/dev/null || echo "[]")

          if [ "$IMAGE_IDS" != "[]" ]; then
            aws ecr batch-delete-image \
              --repository-name "$ECR_REPOSITORY" \
              --image-ids "$IMAGE_IDS" \
              --region "$AWS_REGION"
            echo "✓ ECR images deleted"
          else
            echo "✓ ECR repository already empty"
          fi

      # ── 7. Terraform setup ───────────────────────────────────────────────────
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}
          terraform_wrapper: false

      - name: Terraform Init
        working-directory: infra
        run: terraform init -input=false

      # ── 8. Terraform Destroy ─────────────────────────────────────────────────
      - name: Terraform Destroy
        working-directory: infra
        env:
          TF_VAR_db_password: ${{ secrets.TF_VAR_DB_PASSWORD }}
          TF_VAR_github_repo: ${{ github.repository }}
        run: terraform destroy -auto-approve -input=false

      # ── 9. Summary ──────────────────────────────────────────────────────────
      - name: Summary
        run: |
          echo "## Infrastructure Destroyed ✅" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "All Terraform-managed AWS resources have been removed." >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "The S3 state bucket (\`terraform-backend-65857\`) was **not** deleted — remove it manually if no longer needed." >> $GITHUB_STEP_SUMMARY
